<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantão PSI - Amanda Maia</title>
    <style>
        :root { --cafe: #8D6E63; --cafe-esc: #4E342E; }
        body { font-family: 'Segoe UI', sans-serif; background: white; color: black; margin: 0; padding: 15px; }
        .logo { color: var(--cafe-esc); font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .login-container { max-width: 320px; margin: 80px auto; padding: 25px; border: 1px solid #ddd; border-radius: 12px; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--cafe); border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: var(--cafe); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .card { background: #Fdf5f2; border: 1px solid #ddd; border-top: 4px solid var(--cafe); padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; min-height: 85px; }
        .check-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; font-size: 12px; padding: 10px 0; text-align: left; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #eee; overflow-x: auto; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: var(--cafe); white-space: nowrap; }
        .tab.active { border-bottom: 3px solid var(--cafe-esc); color: var(--cafe-esc); }
        #app-content, #editor, .aba-view { display: none; }
        table { width:100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 6px; text-align: left; vertical-align: top; }
        .titulo-leito { background: var(--cafe-esc); color: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 18px; font-weight: bold; }
        @media print { .tabs, #editor, select, .logo, button, #mapa, .header-uti { display: none !important; } .aba-view { display: block !important; } }
    </style>
</head>
<body>

<div id="login-screen" class="login-container">
    <div class="logo">PLANTÃO <span style="color:var(--cafe)">PSI</span></div>
    <input type="password" id="pass" placeholder="Senha de Acesso">
    <button onclick="logar()">ENTRAR</button>
</div>

<div id="app-content">
    <div class="logo">PLANTÃO <span style="color:var(--cafe)">PSI</span></div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('mapa')">🗺️ MAPA</div>
        <div class="tab" onclick="switchTab('pen')">📌 PENDÊNCIAS</div>
        <div class="tab" onclick="switchTab('alt')">🚪 ALTAS</div>
        <div class="tab" onclick="switchTab('pas')">🖨️ PASSAGEM</div>
    </div>

    <div id="aba-mapa" class="aba-view" style="display: block;">
        <select id="sel-uti" onchange="renderMapa()" class="header-uti"></select>
        <div class="grid" id="mapa"></div>
        <div id="editor" style="margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px;">
            <div id="nome-topo" class="titulo-leito">LEITO</div>
            <input type="text" id="p-nome" placeholder="Nome Completo do Paciente" oninput="atualizarNomeTopo()">
            <div class="check-grid">
                <label><input type="checkbox" id="p-vm"> VM</label>
                <label><input type="checkbox" id="p-esp"> ESPONTÂNEA</label>
                <label><input type="checkbox" id="p-del"> DELIRIUM</label>
                <label><input type="checkbox" id="p-iso"> ISOLAMENTO</label>
                <label><input type="checkbox" id="p-cp"> PALIATIVO</label>
                <label><input type="checkbox" id="p-cf"> CONFERÊNCIA</label>
                <label><input type="checkbox" id="p-poi"> POI</label>
                <label><input type="checkbox" id="p-alta"> ALTA</label>
            </div>
            <textarea id="p-prob" rows="3" placeholder="Lista de Problemas / Diagnósticos"></textarea>
            <textarea id="p-hist" rows="4" placeholder="História Médica / Evolução Clínica"></textarea>
            <textarea id="p-psiq" rows="4" placeholder="Exame das Funções Psíquicas (Atenção, Humor, Pensamento...)"></textarea>
            <textarea id="p-cond" rows="4" placeholder="Manejo e Conduta Psicológica"></textarea>
            <textarea id="p-pend" rows="2" placeholder="📌 Pendências para o próximo plantão"></textarea>
            <button onclick="salvar()">💾 SALVAR NO SISTEMA</button>
        </div>
    </div>

    <div id="aba-pen" class="aba-view"><h3>📌 Pendências por Leito</h3><div id="lista-pen"></div></div>
    <div id="aba-alt" class="aba-view"><h3>🚪 Previsão de Altas</h3><div id="lista-alt"></div></div>
    <div id="aba-pas" class="aba-view"><h3>📋 Relatório de Passagem de Plantão</h3><div id="tab-pas"></div></div>
</div>
