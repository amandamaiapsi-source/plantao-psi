<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantão PSI - Amanda Maia</title>
    <style>
        :root { --cafe: #8D6E63; --cafe-esc: #4E342E; }
        body { font-family: 'Segoe UI', sans-serif; background: white; color: black; margin: 0; padding: 15px; }
        .logo { color: var(--cafe-esc); font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .login-container { max-width: 320px; margin: 80px auto; padding: 25px; border: 1px solid #ddd; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid var(--cafe); border-radius: 6px; box-sizing: border-box; font-size: 14px; display: block; }
        label { font-weight: bold; color: var(--cafe-esc); font-size: 14px; display: block; margin-top: 10px; }
        button { width: 100%; padding: 12px; background: var(--cafe); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .card { background: #Fdf5f2; border: 1px solid #ddd; border-top: 4px solid var(--cafe); padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .check-item { display: flex; align-items: center; gap: 8px; font-weight: normal; color: black; font-size: 12px; cursor: pointer; }
        .check-item input { width: auto; margin: 0; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #eee; overflow-x: auto; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: var(--cafe); white-space: nowrap; }
        .tab.active { border-bottom: 3px solid var(--cafe-esc); color: var(--cafe-esc); }
        #app-content, #editor, .aba-view { display: none; }
        table { width:100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 6px; text-align: left; vertical-align: top; }
        .titulo-leito { background: var(--cafe-esc); color: white; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        @media print { .tabs, #editor, select, .logo, button, label { display: none !important; } .aba-view { display: block !important; } }
    </style>
</head>
<body>

<div id="login-screen" class="login-container">
    <div class="logo">PLANTÃO <span style="color:var(--cafe)">PSI</span></div>
    <input type="password" id="pass" placeholder="Senha de Acesso">
    <button onclick="logar()">ENTRAR</button>
</div>

<div id="app-content">
    <div class="logo">PLANTÃO <span style="color:var(--cafe)">PSI</span></div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('mapa')">🗺️ MAPA</div>
        <div class="tab" onclick="switchTab('pen')">📌 PENDÊNCIAS</div>
        <div class="tab" onclick="switchTab('alt')">🚪 ALTAS</div>
        <div class="tab" onclick="switchTab('pas')">🖨️ PASSAGEM</div>
    </div>

    <div id="aba-mapa" class="aba-view" style="display: block;">
        <select id="sel-uti" onchange="renderMapa()"></select>
        <div class="grid" id="mapa"></div>
        <div id="editor" style="margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px;">
            <div id="nome-topo" class="titulo-leito">LEITO</div>
            
            <label>Paciente:</label>
            <input type="text" id="p-nome" placeholder="Nome completo" oninput="atualizarNomeTopo()">
            
            <label>Marcadores Clínicos:</label>
            <div class="check-grid">
                <label class="check-item"><input type="checkbox" id="p-vm"> VM</label>
                <label class="check-item"><input type="checkbox" id="p-esp"> ESPONTÂNEA</label>
                <label class="check-item"><input type="checkbox" id="p-del"> DELIRIUM</label>
                <label class="check-item"><input type="checkbox" id="p-iso"> ISOLAMENTO</label>
                <label class="check-item"><input type="checkbox" id="p-cp"> PALIATIVO</label>
                <label class="check-item"><input type="checkbox" id="p-cf"> CONFERÊNCIA</label>
                <label class="check-item"><input type="checkbox" id="p-poi"> POI</label>
                <label class="check-item"><input type="checkbox" id="p-alta"> ALTA</label>
            </div>

            <label>Lista de Problemas:</label>
            <textarea id="p-prob" rows="2"></textarea>
            
            <label>História / Evolução:</label>
            <textarea id="p-hist" rows="4"></textarea>
            
            <label>Exame das Funções Psíquicas:</label>
            <textarea id="p-psiq" rows="4"></textarea>
            
            <label>Manejo e Conduta:</label>
            <textarea id="p-cond" rows="4"></textarea>
            
            <label>📌 Pendências Específicas:</label>
            <div class="check-grid">
                <label class="check-item"><input type="checkbox" id="pen-f"> Falar com Família</label>
                <label class="check-item"><input type="checkbox" id="pen-e"> Discutir Equipe</label>
                <label class="check-item"><input type="checkbox" id="pen-cdi"> Avaliar CDI / TRC</label>
                <label class="check-item"><input type="checkbox" id="pen-vi"> Visita Infantil</label>
                <label class="check-item"><input type="checkbox" id="pen-ve"> Visita Estendida</label>
                <label class="check-item"><input type="checkbox" id="pen-h"> Fechamento Alta</label>
            </div>
            <textarea id="p-obs" rows="2" placeholder="Outras observações..."></textarea>
            <button onclick="salvar()">💾 SALVAR DADOS</button>
        </div>
    </div>
