<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTÃO PSI - AMANDA MAIA</title>
    <style>
        :root { --cafe: #8D6E63; --cafe-esc: #4E342E; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; padding: 15px; }
        .login-card { max-width: 350px; margin: 80px auto; padding: 30px; border: 2px solid var(--cafe); border-radius: 12px; text-align: center; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--cafe); border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--cafe); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid-leitos { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .card-leito { background: #Fdf5f2; border: 1px solid #ddd; border-top: 4px solid var(--cafe); padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; }
        .check-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 0; }
        .check-box { display: flex; align-items: center; gap: 8px; font-weight: normal; font-size: 13px; cursor: pointer; }
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #eee; overflow-x: auto; }
        .nav-tab { padding: 10px; cursor: pointer; font-weight: bold; color: var(--cafe); white-space: nowrap; }
        .nav-tab.active { border-bottom: 3px solid var(--cafe-esc); color: var(--cafe-esc); }
        #sistema-completo, #painel-editor, .secao-aba { display: none; }
        .header-leito { background: var(--cafe-esc); color: white; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; }
        .tabela-multi { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .tabela-multi th, .tabela-multi td { border: 1px solid #333; padding: 8px; text-align: left; vertical-align: top; }
        @media print { 
            .nav-tabs, #painel-editor, select, button, label, .grid-leitos, .login-card { display: none !important; }
            #sistema-completo, #aba-pas { display: block !important; }
            @page { size: landscape; }
        }
    </style>
</head>

<div id="tela-login" class="login-card">
    <h2 style="color:var(--cafe-esc)">GESTÃO PSI</h2>
    <input type="password" id="pass_input" placeholder="Senha: psi123">
    <button onclick="entrar_agora()">ENTRAR</button>
</div>

        <div class="nav-tab" onclick="aba('pas')">VISITA MULTI</div>
    </div>
