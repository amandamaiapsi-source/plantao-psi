<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PSI AMANDA</title>
    <style>
        :root { --cafe: #8D6E63; --cafe-esc: #4E342E; }
        body { font-family: sans-serif; background: #fff; padding: 15px; }
        .login-box { max-width: 300px; margin: 60px auto; padding: 20px; border: 2px solid var(--cafe); border-radius: 10px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--cafe); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #painel, .aba, #editor { display: none; }
        .tabs { display: flex; gap: 8px; border-bottom: 2px solid #eee; margin-bottom: 15px; overflow-x: auto; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: var(--cafe); white-space: nowrap; }
        .tab.active { border-bottom: 3px solid var(--cafe-esc); color: var(--cafe-esc); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .card { background: #fdf5f2; border: 1px solid #ddd; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; border-top: 4px solid var(--cafe); }
        label { font-weight: bold; display: block; margin-top: 10px; color: var(--cafe-esc); font-size: 14px; }
        textarea { width: 100%; padding: 8px; border: 1px solid var(--cafe); border-radius: 5px; box-sizing: border-box; }
        .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px 0; font-size: 12px; }
        .p-box { border: 2px solid #000; padding: 10px; margin-bottom: 15px; }
        @media print { .tabs, #editor, button, label, .grid, .login-box, select { display: none !important; } .p-box, #aba-pas { display: block !important; } }
    </style>
</head>
<body>

<div id="tela-login" class="login-box">
    <h3>ACESSO RESTRITO</h3>
    <input type="password" id="campo-senha" placeholder="DIGITE A SENHA">
    <button onclick="tentarEntrar()">ENTRAR</button>
</div>

<div id="painel">
    <div class="tabs">
        <div class="tab" id="t-mapa" onclick="mudarTab('mapa')">MAPA</div>
        <div class="tab" id="t-pas" onclick="mudarTab('pas')">IMPRIMIR</div>
    </div>

    <div id="aba-mapa" class="aba" style="display:block">
        <select id="escolha-uti" onchange="gerarMapa()"></select>
