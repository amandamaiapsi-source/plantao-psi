<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PSI v2026</title>
    <style>
        :root { --cafe: #8D6E63; --cafe-esc: #4E342E; }
        body { font-family: sans-serif; background: #fff; padding: 20px; }
        .login-box { max-width: 300px; margin: 50px auto; padding: 20px; border: 2px solid var(--cafe); border-radius: 10px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; display: block; }
        button { width: 100%; padding: 12px; background: var(--cafe); color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #app-content, .aba, #editor { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .card { background: #fdf5f2; border: 1px solid #ddd; padding: 10px; text-align: center; cursor: pointer; border-radius: 5px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #eee; margin-bottom: 15px; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: var(--cafe); }
        label { font-weight: bold; display: block; margin-top: 10px; color: var(--cafe-esc); }
        textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--cafe); border-radius: 5px; }
        .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px 0; font-size: 13px; }
        .p-box { border: 1px solid #000; padding: 10px; margin-bottom: 10px; display: none; }
        @media print { .tabs, #editor, .logo, button, label, .grid, .login-box, select { display: none !important; } #aba-pas, .p-box { display: block !important; } }
    </style>
</head>
<body>

<div id="login-box" class="login-box">
    <h2>ACESSO PSI</h2>
    <input type="password" id="p" placeholder="SENHA" onkeypress="if(event.key==='Enter') entrar()">
    <button onclick="entrar()">ENTRAR</button>
</div>

<div id="app-content">
    <div class="tabs">
        <div class="tab" onclick="tab('mapa')">MAPA</div>
        <div class="tab" onclick="tab('pen')">PENDÊNCIAS</div>
        <div class="tab" onclick="switchRel()">IMPRIMIR</div>
    </div>

    <div id="aba-mapa" class="aba" style="display:block">
        <select id="uti" onchange="mapa()"></select>
        <div id="grid" class="grid"></div>
        
        <div id="editor" style="margin-top:20px; border-top:2px solid #eee; padding-top:10px;">
            <div id="topo" style="background:var(--cafe-esc); color:white; padding:10px; border-radius:5px; font-weight:bold;">LEITO</div>
            <label>Paciente:</label><input type="text" id="n">
            <label>Marcadores:</label>
            <div class="checks">
                <label><input type="checkbox" id="vm"> VM</label>
                <label><input type="checkbox" id="esp"> ESP</label>
                <label><input type="checkbox" id="del"> DEL</label>
                <label><input type="checkbox" id="cp"> CP</label>
                <label><input type="checkbox" id="iso"> ISO</label>
                <label><input type="checkbox" id="alt"> ALTA</label>
            </div>
            <label>Problemas:</label><textarea id="pr" rows="2"></textarea>
            <label>Evolução:</label><textarea id="ev" rows="3"></textarea>
            <label>Exame Psíquico:</label><textarea id="ex" rows="3"></textarea>
            <label>Conduta:</label><textarea id="co" rows="3"></textarea>
            <label>Boletim:</label><textarea id="bo" rows="2"></textarea>
            <label>Pendências:</label>
            <div class="checks">
                <label><input type="checkbox" id="pf"> Família</label>
                <label><input type="checkbox" id="pb"> Boletim</label>
                <label><input type="checkbox" id="pc"> CDI/TRC</label>
            </div>
            <button onclick="salvar()">💾 SALVAR NO LEITO</button>
        </div>
    </div>

    <div id="aba-pen" class="aba"><h3>Pendências</h3><div id="l-pen"></div></div>
    <div id="aba-pas" class="aba"><h2 style="text-align:center">PLANTÃO PSI</h2><div id="corpo"></div></div>
</div>
