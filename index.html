<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTÃO DE LEITOS UTI - PSICOLOGIA HOSPITALAR</title>
    <style>
        :root { --cafe: #8D6E63; --cafe-esc: #4E342E; --vermelho: #e57373; --roxo: #ba68c8; --azul: #64b5f6; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #000; margin: 0; padding: 15px; }
        .logo-psi { color: var(--cafe-esc); font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        .login-card { max-width: 350px; margin: 80px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid var(--cafe); border-radius: 6px; box-sizing: border-box; font-size: 14px; display: block; }
        label { font-weight: bold; color: var(--cafe-esc); display: block; margin-top: 10px; font-size: 14px; }
        .btn-acao { width: 100%; padding: 12px; background: var(--cafe); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* GRADE DO MAPA */
        .grid-leitos { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .card-leito { background: #Fdf5f2; border: 1px solid #ddd; border-top: 5px solid var(--cafe); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; min-height: 90px; position: relative; }
        
        /* ALERTAS NO MAPA */
        .alert-vm { border-top-color: var(--azul) !important; background: #e3f2fd; }
        .alert-del { border-top-color: var(--vermelho) !important; background: #ffebee; }
        .alert-cp { border-top-color: var(--roxo) !important; background: #f3e5f5; }
        .tag-alerta { font-size: 9px; font-weight: bold; display: block; margin-top: 3px; color: #555; }

        .check-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 0; }
        .check-box { display: flex; align-items: center; gap: 8px; font-weight: normal; font-size: 12px; cursor: pointer; }
        .check-box input { width: 18px; height: 18px; margin: 0; }
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #eee; overflow-x: auto; }
        .nav-tab { padding: 10px; cursor: pointer; font-weight: bold; color: var(--cafe); white-space: nowrap; }
        .nav-tab.active { border-bottom: 3px solid var(--cafe-esc); color: var(--cafe-esc); }
        #modulo-principal, #painel-editor, .secao-visivel { display: none; }
        .header-leito { background: var(--cafe-esc); color: white; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        
        .tabela-multi { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        .tabela-multi th, .tabela-multi td { border: 1px solid #000; padding: 5px; text-align: left; vertical-align: top; }
        .tabela-multi th { background-color: #f2f2f2; }

        @media print {
            @page { size: landscape; margin: 0.5cm; }
            .nav-tabs, #painel-editor, select, .logo-psi, .btn-acao, label, .grid-leitos, .login-card { display: none !important; }
            #modulo-principal, #aba-pas, .tabela-multi { display: table !important; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

<div id="tela-login" class="login-card">
    <div class="logo-psi">GESTÃO DE LEITOS UTI<br><span style="color:var(--cafe); font-size: 12px;">PSICOLOGIA HOSPITALAR</span></div>
    <form onsubmit="event.preventDefault(); acionar();">
        <input type="password" id="pass" placeholder="Senha: psi123" required>
        <button type="submit" class="btn-acao">ENTRAR</button>
    </form>
</div>

<div id="modulo-principal">
    <div class="nav-tabs">
        <div class="nav-tab active" onclick="navegar('mapa')">🗺️ MAPA</div>
        <div class="nav-tab" onclick="navegar('bol')">📢 BOLETIM</div>
        <div class="nav-tab" onclick="navegar('pen')">📌 PENDÊNCIAS</div>
        <div class="nav-tab" onclick="navegar('pas')">📋 VISITA MULTI</div>
    </div>

    <div id="aba-mapa" class="secao-visivel" style="display: block;">
        <select id="sel_uti" onchange="render_mapa()"></select>
        <div class="grid-leitos" id="grid"></div>
        
        <div id="painel-editor" style="margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px;">
            <div id="display-quarto" class="header-leito">LEITO</div>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 3;"><label>Nome do Paciente:</label><input type="text" id="p_nome" oninput="up_tit()"></div>
                <div style="flex: 1;"><label>Idade:</label><input type="text" id="p_idade"></div>
            </div>
            <label>Código Smart (Prontuário):</label><input type="text" id="p_smart" placeholder="Ex: 123456">
            
            <label>Marcadores Clínicos:</label>
            <div class="check-container">
                <label class="check-box"><input type="checkbox" id="m_vm"> 🔵 VM</label>
                <label class="check-box"><input type="checkbox" id="m_del"> 🔴 DELIRIUM</label>
                <label class="check-box"><input type="checkbox" id="m_cp"> 🟣 PALIATIVO</label>
                <label class="check-box"><input type="checkbox" id="m_iso"> ISOLAMENTO</label>
                <label class="check-box"><input type="checkbox" id="m_esp"> ESPONTÂNEA</label>
                <label class="check-box"><input type="checkbox" id="m_cf"> CONFERÊNCIA</label>
                <label class="check-box"><input type="checkbox" id="m_poi"> POI</label>
                <label class="check-box"><input type="checkbox" id="m_alta"> ALTA</label>
            </div>

            <label>Problemas / Diagnósticos:</label><textarea id="p_prob" rows="2"></textarea>
            <label>Evolução / Exame Psíquico:</label><textarea id="p_evo" rows="3"></textarea>
            <label>Manejo e Conduta:</label><textarea id="p_cond" rows="3"></textarea>

                <label class="check-box"><input type="checkbox" id="pe_f"> Família</
