<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTÃO PSI - AMANDA MAIA</title>
    <style>
        :root { --cafe: #8D6E63; --cafe-esc: #4E342E; --vm: #bbdefb; --del: #ffcdd2; --pal: #e1bee7; --iso: #fff9c4; --alta: #ffe0b2; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; padding: 15px; }
        .login-box { max-width: 350px; margin: 80px auto; padding: 30px; border: 2px solid var(--cafe); border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid var(--cafe); border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: var(--cafe); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #app, .aba, #editor { display: none; }
        .tabs { display: flex; gap: 5px; border-bottom: 2px solid #eee; margin-bottom: 15px; overflow-x: auto; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: var(--cafe); white-space: nowrap; }
        .tab.active { border-bottom: 3px solid var(--cafe-esc); color: var(--cafe-esc); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .card { background: #fdf5f2; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border-top: 6px solid var(--cafe); min-height: 110px; }
        .c-vm { background: var(--vm) !important; border-top-color: #2196f3 !important; }
        .c-del { background: var(--del) !important; border-top-color: #f44336 !important; }
        .c-pal { background: var(--pal) !important; border-top-color: #9c27b0 !important; }
        .c-iso { background: var(--iso) !important; border-top-color: #fbc02d !important; }
        .c-alta { background: var(--alta) !important; border-top-color: #fb8c00 !important; }
        .tag { font-size: 9px; font-weight: bold; display: block; margin-top: 2px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 5px; text-align: left; vertical-align: top; }
        @media print { 
            .tabs, #editor, button, label, .grid, .login-box, select, h3, .tit-aba { display: none !important; } 
            #aba-multi, #area_impressao { display: block !important; }
            table { display: table !important; width: 100% !important; }
            @page { size: landscape; margin: 0.5cm; }
        }
    </style>
</head>
<body>

<div id="login" class="login-box">
    <h2 style="color:var(--cafe-esc)">GESTÃO PSI</h2>
    <input type="password" id="sk_key" placeholder="Senha: psi123">
    <button class="btn" onclick="entrar()">ENTRAR</button>
</div>

<div id="app">
    <div class="tabs">
        <div class="tab active" onclick="ver('mapa')">🗺️ MAPA</div>
        <div class="tab" onclick="ver('bol')">📢 BOLETIM</div>
        <div class="tab" onclick="ver('pen')">📌 PENDÊNCIAS</div>
        <div class="tab" onclick="ver('multi')">📋 VISITA MULTI</div>
    </div>

    <div id="aba-mapa" class="aba" style="display:block">
        <select id="uti" onchange="mapa()"></select>
        <div id="grade" class="grid"></div>
        <div id="editor" style="margin-top:20px; border-top:2px solid #eee; padding-top:15px;">
            <div id="tl" style="background:var(--cafe-esc); color:white; padding:10px; border-radius:6px; font-weight:bold; margin-bottom:10px;">LEITO</div>
            <div style="display:flex; gap:10px;"><input type="text" id="n" placeholder="Paciente"><input type="text" id="id" placeholder="Idade"></div>
            <input type="text" id="sm" placeholder="Código Smart">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size:12px;">
                <label><input type="checkbox" id="m_vm"> 🔵 VM/Sed</label>
                <label><input type="checkbox" id="m_del"> 🔴 Delirium</label>
