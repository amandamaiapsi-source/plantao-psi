<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTÃO PSI - AMANDA MAIA</title>
    <style>
        :root { --cor-psi: #8D6E63; --cor-esc: #4E342E; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; margin: 0; padding: 15px; color: #000; }
        /* LOGIN REFORÇADO */
        .caixa-acesso { max-width: 320px; margin: 70px auto; padding: 30px; border: 2px solid var(--cor-psi); border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .caixa-acesso h2 { color: var(--cor-esc); margin-bottom: 20px; font-size: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--cor-psi); border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .botao-master { width: 100%; padding: 14px; background: var(--cor-psi); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        /* INTERFACE */
        #bloco-sistema, #editor-leito, .aba-conteudo { display: none; }
        .abas-nav { display: flex; gap: 8px; border-bottom: 2px solid #eee; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .aba-link { padding: 10px 15px; cursor: pointer; font-weight: bold; color: var(--cor-psi); white-space: nowrap; transition: 0.3s; }
        .aba-link.ativa { border-bottom: 4px solid var(--cor-esc); color: var(--cor-esc); }
        .grade-quartos { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .quadrado-leito { background: #fdf5f2; border: 1px solid #ddd; border-top: 5px solid var(--cor-psi); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; }
        .titulo-secao { background: var(--cor-esc); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        /* QUADRADINHOS ORGANIZADOS */
        .painel-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .opcao-check { display: flex; align-items: center; gap: 10px; font-weight: normal; font-size: 13px; cursor: pointer; }
        .opcao-check input { width: 18px; height: 18px; cursor: pointer; }
        /* TABELA MULTI */
        .tab-multi { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        .tab-multi th, .tab-multi td { border: 1px solid #444; padding: 10px; text-align: left; vertical-align: top; }
        .tab-multi th { background: #f8f1ef; }
        @media print {
            @page { size: landscape; margin: 1cm; }
            .abas-nav, #editor-leito, select, button, .grade-quartos, .caixa-acesso { display: none !important; }
            #bloco-sistema, #aba-passagem { display: block !important; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

<div id="tela-login" class="caixa-acesso">
    <h2>SISTEMA PSI UTI</h2>
    <input type="password" id="chave_mestra" placeholder="Senha de Acesso" autocomplete="new-password">
    <button class="botao-master" onclick="liberar_sistema()">ENTRAR</button>
</div>

<div id="bloco-sistema">
    <div class="abas-nav">
        <div class="aba-link ativa" onclick="mudar_aba('mapa')">🗺️ MAPA</div>
        <div class="aba-link" onclick="mudar_aba('pen')">📌 PENDÊNCIAS</div>
        <div class="aba-link" onclick="mudar_aba('multi')">📋 VISITA MULTI</div>
    </div>

    <div id="aba-mapa" class="aba-conteudo" style="display: block;">
        <select id="seletor_uti" onchange="atualizar_visua()"></select>
        <div class="grade-quartos" id="grid_principal"></div>
        
        <div id="editor-leito" style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">
            <div id="label_quarto" class="titulo-secao">LEITO</div>
            <label>Nome do Paciente:</label>
            <input type="text" id="campo_nome">
            
            <label>Marcadores Clínicos:</label>
            <div class="painel-checks">
                <label class="opcao-check">
