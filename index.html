<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantão PSI - Amanda Maia</title>
    <style>
        :root { --cafe: #8D6E63; --cafe-esc: #4E342E; }
        body { font-family: 'Segoe UI', sans-serif; background: white; color: black; margin: 0; padding: 15px; }
        .logo { color: var(--cafe-esc); font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .login-container { max-width: 320px; margin: 80px auto; padding: 25px; border: 1px solid #ddd; border-radius: 12px; text-align: center; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid var(--cafe); border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        label { font-weight: bold; color: var(--cafe-esc); font-size: 14px; display: block; margin-top: 10px; }
        button { width: 100%; padding: 12px; background: var(--cafe); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; }
        .card { background: #Fdf5f2; border: 1px solid #ddd; border-top: 4px solid var(--cafe); padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; min-height: 85px; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; }
        .check-item { display: flex; align-items: center; gap: 8px; font-weight: normal; font-size: 12px; cursor: pointer; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #eee; overflow-x: auto; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: var(--cafe); white-space: nowrap; }
        .tab.active { border-bottom: 3px solid var(--cafe-esc); color: var(--cafe-esc); }
        #app-content, #editor, .aba-view { display: none; }
        
        /* TABELA DE IMPRESSÃO - FORÇA BRUTA */
        .print-only { display: none; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 20px; }
        th, td { border: 1.5px solid black !important; padding: 8px !important; text-align: left; vertical-align: top; font-size: 10px; word-wrap: break-word; }
        th { background-color: #f0f0f0 !important; font-weight: bold; }

        @media print { 
            @page { size: landscape; margin: 0.5cm; }
            html, body { background: white !important; width: 100%; height: 100%; margin: 0 !important; padding: 0 !important; }
            .tabs, #editor, select, .logo, button, label, h3, .grid, .login-container, .card, .header-uti { display: none !important; } 
            .aba-view { display: none !important; }
            #aba-pas { display: block !important; width: 100% !important; }
            .print-only { display: block !important; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
            table { display: table !important; border: 1.5px solid black !important; }
            td, th { border: 1.5px solid black !important; }
        }
    </style>
</head>
<body>

<div id="login-screen" class="login-container">
    <div class="logo">PLANTÃO <span style="color:var(--cafe)">PSI</span></div>
    <input type="password" id="pass" placeholder="Senha de Acesso">
    <button onclick="logar()">ENTRAR</button>
</div>

<div id="app-content">
    <div class="logo">PLANTÃO <span style="color:var(--cafe)">PSI</span></div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('mapa')">🗺️ MAPA</div>
        <div class="tab" onclick="switchTab('bol')">📢 BOLETIM</div>
        <div class="tab" onclick="switchTab('pen')">📌 PENDÊNCIAS</div>
        <div class="tab" onclick="switchTab('alt')">🚪 ALTAS</div>
        <div class="tab" onclick="switchTab('pas')">🖨️ IMPRIMIR</div>
    </div>

    <div id="aba-mapa" class="aba-view" style="display: block;">
        <select id="sel-uti" onchange="renderMapa()" class="header-uti"></select>
        <div class="grid" id="mapa"></div>
        <div id="editor" style="margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px;">
            <div id="nome-topo" style="background:var(--cafe-esc);color:white;padding:10px;border-radius:6px;font-weight:bold;">LEITO</div>
            <label>Paciente:</label>
            <input type="text" id="p-nome" placeholder="Nome completo" oninput="atualizarNomeTopo()">
            <label>Marcadores Clínicos:</label>
            <div class="check-grid">
